<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <h1>Vocab Builder <span id="levelBadge" class="lv">Lv.1</span></h1>
    <div class="stats">
      <div class="stat">Score <b id="score">0</b></div>
      <div class="stat">Hand <b id="handCount">0</b></div>
      <div class="stat">Deck <b id="deckCount">0</b></div>
    </div>
  </header>

  <main class="table">
    <section class="target-area">
      <div class="label">Target</div>
      <div id="targetHint" class="target-hint">Loading...</div>
    </section>

    <section class="sentence-area">
      <div class="label">Your Sentence</div>
      <div id="sentenceSlots" class="slots"></div>
    </section>

    <div id="feedback" class="feedback"></div>

    <section class="hand-area">
      <div class="label">Your Hand</div>
      <div id="hand" class="hand"></div>
    </section>

    <div class="actions">
      <button class="btn" id="clearBtn">Clear</button>
      <button class="btn" id="drawBtn">Draw</button>
      <button class="btn" id="restartBtn">New Game</button>
      <button class="btn" id="vocabBtn">Word List</button>
    </div>

    <section class="vocab-panel" id="vocabPanel">
      <div class="label">Learned Words</div>
      <div id="vocabList" class="vocab-list"></div>
    </section>

    <div class="settings">
      <span class="tip" id="tip"></span>
    </div>
  </main>
</div>
<script src="game.js"></script>
</body>
</html>
